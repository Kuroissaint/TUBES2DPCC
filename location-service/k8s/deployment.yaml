apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
  labels:
    app: location-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
      - name: location-service
        image: my-registry/location-service:35 # Akan di-update oleh Jenkins
        ports:
        - containerPort: 8002 # Jatah port untuk Location
        env:
        - name: DB_HOST
          value: "db-postgres-service"
        - name: DB_NAME
          value: "db_location" # Format: db_nama_service
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "123"